name: Build CityCAR iOS & Android

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update capacitor config for maps
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.citycar.app",
            "appName": "CityCAR",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "iosScheme": "capacitor",
              "cleartext": true,
              "allowNavigation": ["*"]
            },
            "ios": {
              "contentInset": "always",
              "allowsLinkPreview": false,
              "scrollEnabled": true,
              "backgroundColor": "#F5F5F5"
            },
            "android": {
              "backgroundColor": "#F5F5F5",
              "allowMixedContent": true,
              "captureInput": true
            },
            "plugins": {
              "Camera": {
                "ios": {
                  "allowEditing": false,
                  "resultType": "uri"
                }
              }
            }
          }
          EOF

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            npx cap sync ios
          fi

      - name: Install custom icons
        run: |
          if [ -d "resources/ios" ]; then
            echo "Installing custom iOS icons..."
            cp -r resources/ios/* ios/App/App/Assets.xcassets/ 2>/dev/null || true
          fi

      - name: Add Camera and Maps permissions (iOS)
        run: |
          cat > ios/App/App/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>CityCAR</string>
              <key>CFBundleExecutable</key>
              <string>App</string>
              <key>CFBundleIdentifier</key>
              <string>com.citycar.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIMainStoryboardFile</key>
              <string>Main</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIViewControllerBasedStatusBarAppearance</key>
              <true/>
              <key>NSCameraUsageDescription</key>
              <string>Это приложение использует камеру для загрузки фото автомобилей</string>
              <key>NSPhotoLibraryAddUsageDescription</key>
              <string>Это приложение сохраняет фото в галерею</string>
              <key>NSPhotoLibraryUsageDescription</key>
              <string>Это приложение использует галерею для выбора фото</string>
              <key>NSLocationWhenInUseUsageDescription</key>
              <string>Это приложение использует геолокацию для показа карты</string>
              <key>NSLocationAlwaysUsageDescription</key>
              <string>Это приложение использует геолокацию для поиска автомобилей</string>
          </dict>
          </plist>
          EOF

      - name: Build iOS Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          cd ios/App
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r CityCAR.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CityCAR-iOS
          path: ios/App/build/CityCAR.ipa

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Update capacitor config for maps
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.citycar.app",
            "appName": "CityCAR",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "iosScheme": "capacitor",
              "cleartext": true,
              "allowNavigation": ["*"]
            },
            "ios": {
              "contentInset": "always",
              "allowsLinkPreview": false,
              "scrollEnabled": true,
              "backgroundColor": "#F5F5F5"
            },
            "android": {
              "backgroundColor": "#F5F5F5",
              "allowMixedContent": true,
              "captureInput": true
            },
            "plugins": {
              "Camera": {
                "ios": {
                  "allowEditing": false,
                  "resultType": "uri"
                }
              }
            }
          }
          EOF

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Install custom icons
        run: |
          if [ -d "resources/android" ]; then
            echo "Installing custom Android icons..."
            cp -r resources/android/* android/app/src/main/res/ 2>/dev/null || true
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Update AndroidManifest.xml (camera, maps, location)
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.ACCESS_MEDIA_LOCATION" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-feature android:name="android.hardware.location" android:required="false" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CityCAR-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
