name: Build Release Signed APK/AAB

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - run: npm install
      
      - name: Add Android platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi
      
      - run: npx cap sync android
      
      # Генерируем keystore
      - name: Generate keystore
        run: |
          mkdir -p android/app/keystore
          keytool -genkey -v \
            -keystore android/app/keystore/release.keystore \
            -alias citycar \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass citycar2024 \
            -keypass citycar2024 \
            -dname "CN=CityCAR, OU=Development, O=CityCAR, L=Voronezh, ST=Voronezh, C=RU"
      
      # Добавляем разрешения в AndroidManifest.xml
      - name: Add Android permissions
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.ACCESS_MEDIA_LOCATION" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      
                  </activity>
                  
              </application>
              
          </manifest>
          EOF
      
      # Собираем APK с абсолютным путем
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/keystore/release.keystore \
            -Pandroid.injected.signing.store.password=citycar2024 \
            -Pandroid.injected.signing.key.alias=citycar \
            -Pandroid.injected.signing.key.password=citycar2024
      
      # Собираем AAB с абсолютным путем
      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/keystore/release.keystore \
            -Pandroid.injected.signing.store.password=citycar2024 \
            -Pandroid.injected.signing.key.alias=citycar \
            -Pandroid.injected.signing.key.password=citycar2024
      
      # Загружаем APK
      - uses: actions/upload-artifact@v4
        with:
          name: citycar-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
      
      # Загружаем AAB
      - uses: actions/upload-artifact@v4
        with:
          name: citycar-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
      
      # Сохраняем keystore (ВАЖНО!)
      - uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: android/app/keystore/release.keystore
